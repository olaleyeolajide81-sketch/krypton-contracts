name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  soroban-build:
    name: Soroban Build Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          target: wasm32-unknown-unknown
          override: true
      
      - name: Cache Cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache Cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache Cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Build Soroban contracts
        run: |
          cargo build --target wasm32-unknown-unknown --release
      
      - name: Verify WASM files
        run: |
          find target/wasm32-unknown-unknown/release -name "*.wasm" -type f

  noir-test:
    name: Noir Circuit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Nargo
        run: |
          curl -L https://raw.githubusercontent.com/noir-lang/noir/main/nargo/install.sh | bash
          echo "$HOME/.nargo/bin" >> $GITHUB_PATH
      
      - name: Run Noir tests
        run: |
          cd circuits/factoring
          nargo test
      
      - name: Verify Noir compilation
        run: |
          cd circuits/factoring
          nargo check
